<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Field Marker App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
/* ============================================================
   GLOBAL STYLES
============================================================ */
body {
    margin: 0;
    font-family: sans-serif;
    height: 100vh;
    overflow: hidden;
}

/* ============================================================
   STARTUP SCREEN
============================================================ */
#startupScreen {
    position: fixed;
    inset: 0;
    background: #f5f5f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 5000;
}

#startupScreen button {
    background: #0078ff;
    color: white;
    border: none;
    padding: 14px 20px;
    border-radius: 8px;
    font-size: 18px;
    cursor: pointer;
    width: 260px;
    margin-top: 10px;
}

/* ============================================================
   MAIN LAYOUT
============================================================ */
#appContainer {
    display: none;
    height: 100vh;
    overflow: hidden;
    display: flex;
}

#sidebar {
    width: 260px;
    background: #f5f5f5;
    border-right: 1px solid #ccc;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

#map {
    flex: 1;
}

/* ============================================================
   CROSSHAIR
============================================================ */
#crosshair {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 40px;
    height: 40px;
    margin-left: -20px;
    margin-top: -20px;
    z-index: 1100;
    pointer-events: none;
    display: none;
}

#crosshair::before,
#crosshair::after {
    content: "";
    position: absolute;
    background: rgba(0,0,0,0.7);
}

#crosshair::before {
    width: 2px;
    height: 40px;
    left: 50%;
    transform: translateX(-50%);
}

#crosshair::after {
    height: 2px;
    width: 40px;
    top: 50%;
    transform: translateY(-50%);
}

#crosshairCircle {
    position: absolute;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2px solid rgba(0,0,0,0.7);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* ============================================================
   ADD OBSERVATION BUTTON
============================================================ */
#addObsBtn {
    position: fixed;
    right: 20px;
    bottom: 20px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #0078ff;
    color: white;
    border: none;
    font-size: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 1200;
}

#addObsBtn.cross-mode {
    background: #27ae60;
}

/* ============================================================
   FORM POPUP
============================================================ */
.form-popup {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #ffffff;
    padding: 22px;
    border-radius: 14px;
    border: 1px solid #ddd;
    width: 90%;
    max-width: 360px;
    z-index: 1000;
    display: none;
    box-shadow: 0 6px 18px rgba(0,0,0,0.15);
}

.form-popup h3 {
    margin-top: 0;
    margin-bottom: 15px;
    font-size: 20px;
    display: flex;
    justify-content: space-between;
}

.form-popup select,
.form-popup input,
.form-popup textarea {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    margin-bottom: 12px;
    font-size: 15px;
}

.form-popup button {
    width: 48%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
    cursor: pointer;
}

.form-popup button:first-of-type {
    background: #27ae60;
    color: white;
}

.form-popup button:last-of-type {
    background: #ccc;
}

</style>
</head>

<body>

<!-- ============================================================
     STARTUP SCREEN HTML
============================================================ -->
<div id="startupScreen">
    <h1>Welkom</h1>
    <p>Kies hoe je wilt beginnen</p>
    <button onclick="startNewProject()">Nieuw project</button>
    <button onclick="openExistingProject()">Bestaand project openen</button>
</div>


<!-- ============================================================
     MAIN APP LAYOUT
============================================================ -->
<div id="appContainer">

    <!-- ========================================================
         SIDEBAR
    ======================================================== -->
    <div id="sidebar">
        <h2>Veldkaart</h2>

        <button onclick="toggleSidebar()">Verberg zijbalk</button>
        <button id="liveBtn" onclick="toggleLive()">Live positie: UIT</button>
        <button onclick="exportCSV()">Export CSV</button>

        <!-- ===================== FILTERS ===================== -->
        <div id="filters">

            <!-- Filter: Type -->
            <div class="filter-section">
                <div class="filter-header" onclick="toggleFilterSection(this)">
                    <span>Type</span><span>▼</span>
                </div>
                <div class="filter-content">
                    <select id="filterType" multiple>
                        <option value="Nest" selected>Nest</option>
                        <option value="Observatie" selected>Observatie</option>
                    </select>
                </div>
            </div>

            <!-- Filter: Species -->
            <div class="filter-section">
                <div class="filter-header" onclick="toggleFilterSection(this)">
                    <span>Soorten</span><span>▼</span>
                </div>
                <div class="filter-content">
                    <select id="filterSpeciesMulti" multiple>
                        <option value="Wilde Eend" selected>Wilde Eend</option>
                        <option value="Meerkoet" selected>Meerkoet</option>
                        <option value="Fuut" selected>Fuut</option>
                        <option value="Blauwe Reiger" selected>Blauwe Reiger</option>
                        <option value="Merel" selected>Merel</option>
                        <option value="Huismus" selected>Huismus</option>
                        <option value="Zwarte Kraai" selected>Zwarte Kraai</option>
                        <option value="Ekster" selected>Ekster</option>
                        <option value="Canadese Gans" selected>Canadese Gans</option>
                        <option value="Knobbelzwaan" selected>Knobbelzwaan</option>
                    </select>
                </div>
            </div>

            <!-- Filter: Photo -->
            <div class="filter-section">
                <div class="filter-header" onclick="toggleFilterSection(this)">
                    <span>Foto</span><span>▼</span>
                </div>
                <div class="filter-content">
                    <label><input type="checkbox" id="filterPhoto"> Alleen met foto</label>
                </div>
            </div>

            <button onclick="resetFilters()">Reset filters</button>
        </div>

        <button id="infoBtn" onclick="showInfo()">ℹ️ Info</button>
    </div>

    <!-- ========================================================
         MAP AREA
    ======================================================== -->
    <div id="map"></div>

    <!-- Crosshair for Add Mode -->
    <div id="crosshair">
        <div id="crosshairCircle"></div>
    </div>

    <!-- Add Observation Button -->
    <button id="addObsBtn" onclick="toggleAddMode()">+</button>

    <!-- ========================================================
         FORM POPUP
    ======================================================== -->
    <div class="form-popup" id="form">
        <h3>
            Marker opslaan
            <span class="close-btn" onclick="closeForm()">×</span>
        </h3>

        <label>Type:</label>
        <select id="type">
            <option value="Observatie">Observatie</option>
            <option value="Nest">Nest</option>
        </select>

        <label>Soort:</label>
        <select id="species">
            <option value="Wilde Eend">Wilde Eend</option>
            <option value="Meerkoet">Meerkoet</option>
            <option value="Fuut">Fuut</option>
            <option value="Blauwe Reiger">Blauwe Reiger</option>
            <option value="Merel">Merel</option>
            <option value="Huismus">Huismus</option>
            <option value="Zwarte Kraai">Zwarte Kraai</option>
            <option value="Ekster">Ekster</option>
            <option value="Canadese Gans">Canadese Gans</option>
            <option value="Knobbelzwaan">Knobbelzwaan</option>
        </select>

        <label>Datum:</label>
        <input type="date" id="date">

        <label>Tijd:</label>
        <input type="time" id="time">

        <label>Opmerking:</label>
        <textarea id="comment" rows="3"></textarea>

        <label>Foto:</label>
        <input type="file" id="photo" accept="image/*">

        <button onclick="saveMarker()">Opslaan</button>
        <button onclick="closeForm()">Annuleren</button>
    </div>

</div>

<!-- ============================================================
     JAVASCRIPT — CORE LOGIC
============================================================ -->
<script>
let map;
let markers = [];
let tempLatLng = null;
let editingId = null;
let addMode = false;

let projectHandle = null;

const centeredIcon = L.icon({
    iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
    iconSize: [25, 41],
    iconAnchor: [12, 41]
});

/* ============================================================
   PROJECT SYSTEM
============================================================ */
async function startNewProject() {
    let name = prompt("Projectnaam") || "project";

    projectHandle = await window.showSaveFilePicker({
        suggestedName: name + ".geojson",
        types: [{
            description: "GeoJSON",
            accept: { "application/geo+json": [".geojson"] }
        }]
    });

    // Create empty project
    localStorage.setItem("markers", "[]");
    await writeGeoJSON();

    // Load the new file into the map
    await readGeoJSONIntoLocalStorage();

    startApp();
}


async function openExistingProject() {
    const [handle] = await window.showOpenFilePicker({
        types: [{
            description: "GeoJSON",
            accept: { "application/geo+json": [".geojson"] }
        }]
    });

    projectHandle = handle;
    await readGeoJSONIntoLocalStorage();
    startApp();
}

function startApp() {
    document.getElementById("startupScreen").style.display = "none";
    document.getElementById("appContainer").style.display = "flex";
    initMap();
    loadMarkers();
    setupFilterListeners();
}

/* ============================================================
   FILE READ / WRITE
============================================================ */
async function writeGeoJSON() {
    if (!projectHandle) return;

    const geojson = markersToGeoJSON();
    const writable = await projectHandle.createWritable();
    await writable.write(JSON.stringify(geojson, null, 2));
    await writable.close();
}

async function readGeoJSONIntoLocalStorage() {
    const file = await projectHandle.getFile();
    const text = await file.text();
    const geojson = JSON.parse(text);

    const importedMarkers = geojson.features.map(f => ({
        id: f.properties.id,
        lat: f.geometry.coordinates[1],
        lng: f.geometry.coordinates[0],
        type: f.properties.type,
        species: f.properties.species,
        date: f.properties.date,
        time: f.properties.time,
        comment: f.properties.comment,
        photo: f.properties.photo
    }));

    localStorage.setItem("markers", JSON.stringify(importedMarkers));
}

/* ============================================================
   MAP INITIALIZATION
============================================================ */
function initMap() {
    let normal = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
    map = L.map('map', {
        center: [52.3867, 4.9643],
        zoom: 15,
        zoomControl: false,   // disable zoom buttons
        layers: [normal]
    });
    ;
}

/* ============================================================
   SAVE MARKER
============================================================ */
function saveMarker() {
    let type = document.getElementById("type").value;
    let species = document.getElementById("species").value;
    let date = document.getElementById("date").value;
    let time = document.getElementById("time").value;
    let comment = document.getElementById("comment").value;
    let file = document.getElementById("photo").files[0];

    let reader = new FileReader();
    tempLatLng = map.getCenter().wrap();
    reader.onload = async function(e) {
        let photoData = e.target.result || null;
        let saved = JSON.parse(localStorage.getItem("markers") || "[]");

        if (editingId) {
            let idx = saved.findIndex(m => m.id === editingId);
            saved[idx].type = type;
            saved[idx].species = species;
            saved[idx].date = date;
            saved[idx].time = time;
            saved[idx].comment = comment;
            if (file) saved[idx].photo = photoData;
        } else {
            saved.push({
                id: Date.now(),
                lat: Number(tempLatLng.lat.toFixed(8)),
                lng: Number(tempLatLng.lng.toFixed(8)),
                type, species, date, time, comment,
                photo: photoData
            });
        }

        localStorage.setItem("markers", JSON.stringify(saved));
        loadMarkers();
        await writeGeoJSON();
        closeForm();
    };

    if (file) reader.readAsDataURL(file);
    else reader.onload({ target: { result: null } });
}

/* ============================================================
   LOAD MARKERS
============================================================ */
function loadMarkers() {
    let saved = JSON.parse(localStorage.getItem("markers") || "[]");

    markers.forEach(m => map.removeLayer(m.layer));
    markers = [];

    saved.forEach(m => {
        let layer = L.marker([m.lat, m.lng], { icon: centeredIcon })
            .bindPopup(makePopupHtml(m))
            .addTo(map);

        markers.push({ id: m.id, data: m, layer });
    });

    applyFilters();
}

/* ============================================================
   POPUP HTML
============================================================ */
function makePopupHtml(m) {
    let html = `<b>${m.type}</b><br>${m.species}<br>${m.date} ${m.time}`;
    if (m.comment) html += `<br><i>${m.comment}</i>`;
    if (m.photo) html += `<br><img src="${m.photo}" style="max-width:100%;">`;
    html += `<br><br><button onclick="editMarker(${m.id})">Wijzig</button>
             <button onclick="deleteMarker(${m.id})">Verwijder</button>`;
    return html;
}

/* ============================================================
   DELETE MARKER
============================================================ */
function deleteMarker(id) {
    let saved = JSON.parse(localStorage.getItem("markers") || "[]");
    saved = saved.filter(m => m.id !== id);
    localStorage.setItem("markers", JSON.stringify(saved));
    loadMarkers();
    writeGeoJSON();
}

/* ============================================================
   EDIT MARKER
============================================================ */
function editMarker(id) {
    let saved = JSON.parse(localStorage.getItem("markers") || "[]");
    let m = saved.find(x => x.id === id);

    editingId = id;
    tempLatLng = { lat: m.lat, lng: m.lng };

    document.getElementById("type").value = m.type;
    document.getElementById("species").value = m.species;
    document.getElementById("date").value = m.date;
    document.getElementById("time").value = m.time;
    document.getElementById("comment").value = m.comment || "";

    document.getElementById("form").style.display = "block";
}

/* ============================================================
   CSV EXPORT
============================================================ */
function exportCSV() {
    let saved = JSON.parse(localStorage.getItem("markers") || "[]");
    let csv = "lat,lng,type,species,date,time,comment\n";

    saved.forEach(m => {
        csv += `${m.lat},${m.lng},${m.type},${m.species},${m.date},${m.time},"${m.comment}"\n`;
    });

    let blob = new Blob([csv], { type: "text/csv" });
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "markers.csv";
    a.click();
}

/* ============================================================
   GEOJSON BUILDER
============================================================ */
function markersToGeoJSON() {
    let saved = JSON.parse(localStorage.getItem("markers") || "[]");

    return {
        type: "FeatureCollection",
        features: saved.map(m => ({
            type: "Feature",
            properties: {
                id: m.id,
                type: m.type,
                species: m.species,
                date: m.date,
                time: m.time,
                comment: m.comment,
                photo: m.photo
            },
            geometry: {
                type: "Point",
                coordinates: [m.lng, m.lat]
            }
        }))
    };
}
</script>

<!-- ============================================================
     JAVASCRIPT — UI LOGIC
============================================================ -->
<script>

/* ============================================================
   ADD MODE (FIXED)
============================================================ */
function toggleAddMode() {
    addMode = !addMode;

    const btn = document.getElementById("addObsBtn");
    const cross = document.getElementById("crosshair");

    if (addMode) {
        btn.classList.add("cross-mode");
        cross.style.display = "block";

        // Track map center as marker location
        map.on("move", updateTempLatLng);
        updateTempLatLng();

        // Reset editing mode
        editingId = null;

        // Open form
        document.getElementById("form").style.display = "block";

    } else {
        btn.classList.remove("cross-mode");
        cross.style.display = "none";
        map.off("move", updateTempLatLng);
    }
}

function updateTempLatLng() {
    tempLatLng = map.getCenter();
}

/* ============================================================
   CLOSE FORM
============================================================ */
function closeForm() {
    document.getElementById("form").style.display = "none";

    addMode = false;
    document.getElementById("addObsBtn").classList.remove("cross-mode");
    document.getElementById("crosshair").style.display = "none";

    map.off("move", updateTempLatLng);
}

/* ============================================================
   FILTER SYSTEM
============================================================ */
function setupFilterListeners() {
    document.getElementById("filterType").addEventListener("change", applyFilters);
    document.getElementById("filterSpeciesMulti").addEventListener("change", applyFilters);
    document.getElementById("filterPhoto").addEventListener("change", applyFilters);
}

function resetFilters() {
    const typeSel = document.getElementById("filterType");
    for (let opt of typeSel.options) opt.selected = true;

    const speciesSel = document.getElementById("filterSpeciesMulti");
    for (let opt of speciesSel.options) opt.selected = true;

    document.getElementById("filterPhoto").checked = false;

    applyFilters();
}

function getSelectedValues(selectEl) {
    let vals = [];
    for (let opt of selectEl.options) {
        if (opt.selected) vals.push(opt.value);
    }
    return vals;
}

function applyFilters() {
    let typeSel = document.getElementById("filterType");
    let speciesSel = document.getElementById("filterSpeciesMulti");
    let onlyPhoto = document.getElementById("filterPhoto").checked;

    let typesAllowed = getSelectedValues(typeSel);
    let speciesAllowed = getSelectedValues(speciesSel);

    markers.forEach(m => {
        let d = m.data;
        let visible = true;

        if (!typesAllowed.includes(d.type)) visible = false;
        if (!speciesAllowed.includes(d.species)) visible = false;
        if (onlyPhoto && !d.photo) visible = false;

        if (visible) {
            if (!map.hasLayer(m.layer)) map.addLayer(m.layer);
        } else {
            if (map.hasLayer(m.layer)) map.removeLayer(m.layer);
        }
    });
}

/* ============================================================
   SIDEBAR TOGGLE
============================================================ */
function toggleSidebar() {
    const sidebar = document.getElementById("sidebar");
    const openBtn = document.getElementById("openSidebarBtn");

    if (sidebar.style.display === "none") {
        sidebar.style.display = "flex";
        openBtn.style.display = "none";
    } else {
        sidebar.style.display = "none";
        openBtn.style.display = "block";
    }
}


/* ============================================================
   LIVE GPS TRACKING
============================================================ */
let liveTracking = false;
let liveMarker = null;
let liveWatchID = null;

function toggleLive() {
    let btn = document.getElementById("liveBtn");

    if (!liveTracking) {
        liveTracking = true;
        btn.textContent = "Live positie: AAN";

        liveWatchID = navigator.geolocation.watchPosition(pos => {
            let lat = pos.coords.latitude;
            let lng = pos.coords.longitude;

            if (!liveMarker) {
                liveMarker = L.circleMarker([lat, lng], {
                    radius: 6,
                    color: "#3498db",
                    weight: 3,
                    fillColor: "#3498db",
                    fillOpacity: 0.9
                }).addTo(map);
            } else {
                liveMarker.setLatLng([lat, lng]);
            }

            map.setView([lat, lng]);
        });

    } else {
        liveTracking = false;
        btn.textContent = "Live positie: UIT";

        if (liveWatchID !== null) {
            navigator.geolocation.clearWatch(liveWatchID);
            liveWatchID = null;
        }
    }
}

/* ============================================================
   INFO POPUP
============================================================ */
function showInfo() {
    alert("Dit is jouw veldkaartproject. GeoJSON wordt automatisch bijgewerkt.");
}

/* ============================================================
   COLLAPSIBLE FILTER SECTIONS
============================================================ */
function toggleFilterSection(headerEl) {
    const content = headerEl.nextElementSibling;
    if (!content) return;

    if (content.style.display === "block") {
        content.style.display = "none";
        headerEl.querySelectorAll("span")[1].textContent = "▼";
    } else {
        content.style.display = "block";
        headerEl.querySelectorAll("span")[1].textContent = "▲";
    }
}

</script>
</body>
</html>
