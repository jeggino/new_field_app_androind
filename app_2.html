<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Field Marker App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            #sidebar {
                width: 100%;
                height: 260px;
                border-bottom: 1px solid #ccc;
            }
        }

        #sidebar {
            background: #f5f5f5;
            border-right: 1px solid #ccc;
            padding: 10px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: relative;
        }

        #sidebar.hidden {
            display: none;
        }

        #sidebar button {
            background: #0078ff;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
        }

        #infoBtn {
            position: absolute;
            bottom: 10px;
            left: 10px;
            width: calc(100% - 20px);
        }

        #map {
            flex: 1;
        }

        #addObsBtn {
            position: fixed;
            right: 20px;
            bottom: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #0078ff;
            color: white;
            border: none;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1200;
        }

        #addObsBtn.cross-mode {
            background: #27ae60;
        }

        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 40px;
            height: 40px;
            margin-left: -20px;
            margin-top: -20px;
            z-index: 1100;
            pointer-events: none;
            display: none;
        }

        #crosshair::before,
        #crosshair::after {
            content: "";
            position: absolute;
            background: rgba(0,0,0,0.7);
        }

        #crosshair::before {
            width: 2px;
            height: 40px;
            left: 50%;
            transform: translateX(-50%);
        }

        #crosshair::after {
            height: 2px;
            width: 40px;
            top: 50%;
            transform: translateY(-50%);
        }

        #crosshairCircle {
            position: absolute;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid rgba(0,0,0,0.7);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .form-popup {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #ccc;
            width: 90%;
            max-width: 340px;
            z-index: 1000;
            display: none;
        }
    </style>
</head>

<body>

    <div id="sidebar">
        <h2>Veldkaart</h2>

        <button onclick="toggleSidebar()">Verberg zijbalk</button>
        <button id="liveBtn" onclick="toggleLive()">Live positie: UIT</button>
        <button onclick="exportCSV()">Export CSV</button>
        <button onclick="exportGeoJSON()">Export GeoJSON</button>

        <input type="file" id="geojsonFile" accept=".geojson" onchange="importGeoJSON()">

        <button id="infoBtn" onclick="showInfo()">ℹ️ Info</button>
    </div>

    <div id="map"></div>

    <div id="crosshair">
        <div id="crosshairCircle"></div>
    </div>

    <button id="addObsBtn" onclick="toggleAddMode()">+</button>

    <div class="form-popup" id="form">
        <h3>
            Marker opslaan
            <span onclick="closeForm()" style="cursor:pointer;font-size:20px;">×</span>
        </h3>

        <label>Type:</label>
        <select id="type">
            <option value="Observatie">Observatie</option>
            <option value="Nest">Nest</option>
        </select><br><br>

        <label>Soort:</label>
        <select id="species">
            <option value="Wilde Eend">Wilde Eend</option>
            <option value="Meerkoet">Meerkoet</option>
            <option value="Fuut">Fuut</option>
            <option value="Blauwe Reiger">Blauwe Reiger</option>
            <option value="Merel">Merel</option>
            <option value="Huismus">Huismus</option>
            <option value="Zwarte Kraai">Zwarte Kraai</option>
            <option value="Ekster">Ekster</option>
            <option value="Canadese Gans">Canadese Gans</option>
            <option value="Knobbelzwaan">Knobbelzwaan</option>
        </select><br><br>

        <label>Datum:</label>
        <input type="date" id="date"><br><br>

        <label>Tijd:</label>
        <input type="time" id="time"><br><br>

        <label>Opmerking:</label>
        <textarea id="comment" rows="3"></textarea><br><br>

        <label>Foto:</label>
        <input type="file" id="photo" accept="image/*"><br><br>

        <button onclick="saveMarker()">Opslaan</button>
        <button onclick="closeForm()">Annuleren</button>
    </div>

<script>
let map;
let markers = [];
let tempLatLng = null;
let editingId = null;
let addMode = false;

const centeredIcon = L.icon({
    iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
    iconSize: [25, 41],
    iconAnchor: [12, 41]
});

window.onload = function () {
    let normal = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
    map = L.map('map', { center: [52.3867, 4.9643], zoom: 15, layers: [normal] });
    loadMarkers();
};

function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("hidden");
}

function toggleAddMode() {
    const btn = document.getElementById("addObsBtn");
    const cross = document.getElementById("crosshair");

    if (!addMode) {
        addMode = true;
        btn.classList.add("cross-mode");
        cross.style.display = "block";
    } else {
        tempLatLng = map.getCenter();
        editingId = null;
        document.getElementById("form").style.display = "block";
        addMode = false;
        btn.classList.remove("cross-mode");
        cross.style.display = "none";
    }
}

function closeForm() {
    document.getElementById("form").style.display = "none";
    tempLatLng = null;
    editingId = null;
}

function saveMarker() {
    let type = document.getElementById("type").value;
    let species = document.getElementById("species").value;
    let date = document.getElementById("date").value;
    let time = document.getElementById("time").value;
    let comment = document.getElementById("comment").value;
    let file = document.getElementById("photo").files[0];

    if (!tempLatLng && !editingId) return;

    let reader = new FileReader();
    reader.onload = function(e) {
        let photoData = e.target.result || null;
        let saved = JSON.parse(localStorage.getItem("markers") || "[]");

        if (editingId) {
            let idx = saved.findIndex(m => m.id === editingId);
            saved[idx].type = type;
            saved[idx].species = species;
            saved[idx].date = date;
            saved[idx].time = time;
            saved[idx].comment = comment;
            if (file) saved[idx].photo = photoData;
        } else {
            saved.push({
                id: Date.now(),
                lat: tempLatLng.lat,
                lng: tempLatLng.lng,
                type, species, date, time, comment,
                photo: photoData
            });
        }

        localStorage.setItem("markers", JSON.stringify(saved));
        loadMarkers();
        autoSaveGeoJSON();
        closeForm();
    };

    if (file) reader.readAsDataURL(file);
    else reader.onload({ target: { result: null } });
}

function loadMarkers() {
    let saved = JSON.parse(localStorage.getItem("markers") || "[]");
    markers.forEach(m => map.removeLayer(m.layer));
    markers = [];

    saved.forEach(m => {
        let layer = L.marker([m.lat, m.lng], { icon: centeredIcon })
            .bindPopup(`<b>${m.type}</b><br>${m.species}<br>${m.date} ${m.time}<br>${m.comment || ""}`)
            .addTo(map);

        markers.push({ id: m.id, data: m, layer });
    });
}

function exportCSV() {
    let saved = JSON.parse(localStorage.getItem("markers") || "[]");
    let csv = "lat,lng,type,species,date,time,comment\n";
    saved.forEach(m => csv += `${m.lat},${m.lng},${m.type},${m.species},${m.date},${m.time},"${m.comment}"\n`);
    let blob = new Blob([csv], { type: "text/csv" });
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "markers.csv";
    a.click();
}

function markersToGeoJSON() {
    let saved = JSON.parse(localStorage.getItem("markers") || "[]");
    return {
        type: "FeatureCollection",
        features: saved.map(m => ({
            type: "Feature",
            properties: m,
            geometry: { type: "Point", coordinates: [m.lng, m.lat] }
        }))
    };
}

function exportGeoJSON() {
    const geojson = markersToGeoJSON();
    const blob = new Blob([JSON.stringify(geojson, null, 2)], { type: "application/geo+json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "markers.geojson";
    a.click();
}

function autoSaveGeoJSON() {
    exportGeoJSON();
}

function importGeoJSON() {
    const file = document.getElementById("geojsonFile").files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        const geojson = JSON.parse(e.target.result);
        const markers = geojson.features.map(f => ({
            ...f.properties,
            lat: f.geometry.coordinates[1],
            lng: f.geometry.coordinates[0]
        }));
        localStorage.setItem("markers", JSON.stringify(markers));
        loadMarkers();
    };
    reader.readAsText(file);
}
</script>

</body>
</html>
