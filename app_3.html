<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Map Interface</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      overflow: hidden;
      background: #e5e7eb;
    }

    /* =========================
       MAIN APP LAYOUT
    ========================= */

    .app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* =========================
       MAP AREA
       Replace this with your real map container if needed
    ========================= */

    #map {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(255,255,255,0.15), rgba(255,255,255,0.15)),
        url("https://tile.openstreetmap.org/5/16/10.png");
      background-size: cover;
      background-position: center;
    }

    .map-placeholder-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 18px 26px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 14px;
      color: #111827;
      font-weight: 700;
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
      pointer-events: none;
    }

    /* =========================
       SIDEBAR
    ========================= */

    .sidebar {
      position: absolute;
      top: 0;
      left: 0;
      width: 280px;
      height: 100%;
      z-index: 900;
      background: #111827;
      color: #ffffff;
      padding: 74px 18px 20px;
      box-shadow: 8px 0 24px rgba(0, 0, 0, 0.28);
      transition: transform 0.25s ease;
    }

    .sidebar.hidden {
      transform: translateX(-100%);
    }

    .sidebar h2 {
      margin: 0 0 20px;
      font-size: 22px;
    }

    .sidebar button {
      width: 100%;
      display: block;
      margin-bottom: 10px;
      padding: 12px 14px;
      border: none;
      border-radius: 10px;
      background: #1f2937;
      color: #ffffff;
      font-size: 14px;
      text-align: left;
      cursor: pointer;
    }

    .sidebar button:hover {
      background: #374151;
    }

    .sidebar-toggle-btn {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 1200;
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(0,0,0,0.25);
    }

    .sidebar-toggle-btn:hover {
      background: #1d4ed8;
    }

    /* =========================
       DIGITAL CLOCK
    ========================= */

    .clock-box {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 850;
      min-width: 170px;
      padding: 12px 18px;
      border-radius: 16px;
      background: rgba(17, 24, 39, 0.9);
      color: #ffffff;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      backdrop-filter: blur(8px);
    }

    .clock-label {
      font-size: 12px;
      color: #cbd5e1;
      margin-bottom: 4px;
      letter-spacing: 0.5px;
    }

    .digital-clock {
      font-size: 25px;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .clock-date {
      font-size: 12px;
      color: #d1d5db;
      margin-top: 4px;
    }

    /* =========================
       FILTER PANEL
    ========================= */

    .filter-panel-wrapper {
      position: absolute;
      top: 86px;
      left: 306px;
      z-index: 820;
      width: 280px;
      transition: left 0.25s ease;
    }

    body.sidebar-collapsed .filter-panel-wrapper {
      left: 16px;
    }

    .toggle-filters-btn {
      width: 100%;
      padding: 10px 12px;
      background: #111827;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      margin-bottom: 8px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.22);
    }

    .filter-panel {
      background: rgba(255, 255, 255, 0.96);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      backdrop-filter: blur(8px);
    }

    .filter-panel.hidden {
      display: none;
    }

    .filter-row {
      display: flex;
      flex-direction: column;
      margin-bottom: 12px;
    }

    .filter-row:last-child {
      margin-bottom: 0;
    }

    .filter-row label {
      font-size: 13px;
      font-weight: 700;
      color: #374151;
      margin-bottom: 5px;
    }

    .filter-row input,
    .filter-row select {
      height: 38px;
      padding: 0 10px;
      border: 1px solid #d1d5db;
      border-radius: 9px;
      font-size: 14px;
      background: white;
    }

    /* =========================
       BOTTOM FORM
    ========================= */

    .bottom-form {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      z-index: 800;

      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 10px;

      max-width: calc(100% - 40px);
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.96);
      box-shadow: 0 8px 26px rgba(0,0,0,0.24);
      backdrop-filter: blur(8px);
    }

    .bottom-form input,
    .bottom-form select {
      height: 38px;
      min-width: 140px;
      padding: 0 10px;
      border: 1px solid #d1d5db;
      border-radius: 9px;
      font-size: 14px;
      background: white;
    }

    .bottom-form button {
      height: 38px;
      padding: 0 18px;
      border: none;
      border-radius: 9px;
      background: #2563eb;
      color: white;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    .bottom-form button:hover {
      background: #1d4ed8;
    }

    /* =========================
       SAVE PROJECT PAGE / VIEW
    ========================= */

    .page {
      display: none;
    }

    .page.active {
      display: block;
    }

    .save-project-page {
      position: absolute;
      inset: 0;
      z-index: 1100;
      background: rgba(15, 23, 42, 0.88);
      backdrop-filter: blur(6px);
      padding: 70px 20px 20px;
      overflow-y: auto;
    }

    .save-project-card {
      max-width: 720px;
      margin: 0 auto;
      background: white;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 18px 60px rgba(0,0,0,0.35);
    }

    .save-project-card h2 {
      margin-top: 0;
      color: #111827;
    }

    .save-form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .save-form-field {
      display: flex;
      flex-direction: column;
    }

    .save-form-field.full {
      grid-column: 1 / -1;
    }

    .save-form-field label {
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 6px;
      color: #374151;
    }

    .save-form-field input,
    .save-form-field select,
    .save-form-field textarea {
      padding: 11px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      font-size: 14px;
      font-family: Arial, sans-serif;
    }

    .save-form-field textarea {
      min-height: 100px;
      resize: vertical;
    }

    .save-actions {
      margin-top: 18px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .secondary-btn,
    .primary-btn {
      padding: 11px 18px;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
    }

    .secondary-btn {
      background: #e5e7eb;
      color: #111827;
    }

    .primary-btn {
      background: #2563eb;
      color: white;
    }

    .primary-btn:hover {
      background: #1d4ed8;
    }

    /* =========================
       DIALOG BOX
    ========================= */

    .info-dialog {
      border: none;
      border-radius: 18px;
      padding: 0;
      width: min(560px, calc(100% - 32px));
      box-shadow: 0 24px 70px rgba(0,0,0,0.38);
      overflow: hidden;
    }

    .info-dialog::backdrop {
      background: rgba(0,0,0,0.46);
    }

    .dialog-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #111827;
      color: white;
      padding: 16px 18px;
    }

    .dialog-header h3 {
      margin: 0;
      font-size: 18px;
    }

    .dialog-close-btn {
      background: transparent;
      border: none;
      color: white;
      font-size: 28px;
      cursor: pointer;
      line-height: 1;
    }

    .dialog-content {
      padding: 18px;
      color: #1f2937;
      line-height: 1.5;
      background: white;
    }

    .dialog-content p {
      margin-top: 0;
    }

    /* =========================
       RESPONSIVE
    ========================= */

    @media (max-width: 900px) {
      .filter-panel-wrapper {
        left: 16px;
        top: 76px;
      }

      .clock-box {
        top: 16px;
        right: 16px;
      }

      .bottom-form {
        flex-wrap: wrap;
        justify-content: center;
        width: calc(100% - 32px);
      }

      .bottom-form input,
      .bottom-form select,
      .bottom-form button {
        flex: 1 1 140px;
      }

      .save-form-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 600px) {
      .clock-box {
        top: 68px;
        right: 16px;
        min-width: 140px;
      }

      .digital-clock {
        font-size: 20px;
      }

      .sidebar {
        width: 250px;
      }

      .filter-panel-wrapper {
        width: calc(100% - 32px);
        top: 145px;
      }

      .map-placeholder-text {
        font-size: 13px;
        padding: 12px 16px;
      }
    }
  </style>
</head>

<body>
  <div class="app">

    <!-- MAP -->
    <div id="map">
      <div class="map-placeholder-text">
        Map Area
      </div>
    </div>

    <!-- SIDEBAR TOGGLE BUTTON OUTSIDE SIDEBAR -->
    <button id="sidebarToggleBtn" class="sidebar-toggle-btn" title="Toggle sidebar">
      ×
    </button>

    <!-- SIDEBAR -->
    <aside id="sidebar" class="sidebar">
      <h2>Menu</h2>
      <button id="newProjectBtn">New Project</button>
      <button id="projectsBtn">Projects</button>
      <button id="infoBtn">Information</button>
      <button id="settingsBtn">Settings</button>
    </aside>

    <!-- DIGITAL CLOCK -->
    <div id="clockBox" class="clock-box">
      <div class="clock-label">Current Time</div>
      <div id="digitalClock" class="digital-clock">--:--:--</div>
      <div id="clockDate" class="clock-date">Loading date...</div>
    </div>

    <!-- FILTERS -->
    <div class="filter-panel-wrapper">
      <button id="toggleFiltersBtn" class="toggle-filters-btn">
        Hide Filters
      </button>

      <div id="filterPanel" class="filter-panel">
        <div class="filter-row">
          <label for="filterStatus">Status</label>
          <select id="filterStatus">
            <option value="">All statuses</option>
            <option value="planning">Planning</option>
            <option value="active">Active</option>
            <option value="completed">Completed</option>
            <option value="paused">Paused</option>
          </select>
        </div>

        <div class="filter-row">
          <label for="filterDate">Date</label>
          <input type="date" id="filterDate" />
        </div>

        <div class="filter-row">
          <label for="filterLocation">Location</label>
          <input type="text" id="filterLocation" placeholder="Enter location" />
        </div>

        <div class="filter-row">
          <label for="filterKeyword">Keyword</label>
          <input type="text" id="filterKeyword" placeholder="Search project" />
        </div>
      </div>
    </div>

    <!-- BOTTOM FILLABLE FORM -->
    <form id="bottomForm" class="bottom-form">
      <input type="text" id="quickProjectName" placeholder="Project name" />
      <input type="text" id="quickLocation" placeholder="Location" />
      <input type="date" id="quickDate" />

      <select id="quickStatus">
        <option value="">Status</option>
        <option value="planning">Planning</option>
        <option value="active">Active</option>
        <option value="completed">Completed</option>
        <option value="paused">Paused</option>
      </select>

      <button type="submit">Save</button>
    </form>

    <!-- SAVE PROJECT PAGE -->
    <section id="saveProjectPage" class="page save-project-page">
      <div class="save-project-card">
        <h2>Save New Project</h2>

        <form id="saveProjectForm">
          <div class="save-form-grid">
            <div class="save-form-field">
              <label for="saveProjectName">Project Name</label>
              <input type="text" id="saveProjectName" placeholder="Enter project name" />
            </div>

            <div class="save-form-field">
              <label for="saveProjectStatus">Status</label>
              <select id="saveProjectStatus">
                <option value="">Select status</option>
                <option value="planning">Planning</option>
                <option value="active">Active</option>
                <option value="completed">Completed</option>
                <option value="paused">Paused</option>
              </select>
            </div>

            <div class="save-form-field">
              <label for="saveProjectLocation">Location</label>
              <input type="text" id="saveProjectLocation" placeholder="Enter location" />
            </div>

            <div class="save-form-field">
              <label for="saveProjectDate">Date</label>
              <input type="date" id="saveProjectDate" />
            </div>

            <div class="save-form-field full">
              <label for="saveProjectDescription">Description</label>
              <textarea id="saveProjectDescription" placeholder="Project details"></textarea>
            </div>
          </div>

          <div class="save-actions">
            <button type="button" id="cancelSaveProjectBtn" class="secondary-btn">
              Back to Map
            </button>
            <button type="submit" class="primary-btn">
              Save Project
            </button>
          </div>
        </form>
      </div>
    </section>

    <!-- INFORMATION DIALOG -->
    <dialog id="infoDialog" class="info-dialog">
      <div class="dialog-header">
        <h3 id="dialogTitle">Information</h3>
        <button id="closeDialogBtn" class="dialog-close-btn">×</button>
      </div>

      <div id="dialogContent" class="dialog-content">
        Information will appear here.
      </div>
    </dialog>

  </div>

  <script>
    /* =========================
       DIGITAL CLOCK
    ========================= */

    function updateClock() {
      const clockElement = document.getElementById("digitalClock");
      const dateElement = document.getElementById("clockDate");

      if (!clockElement || !dateElement) return;

      const now = new Date();

      const time = now.toLocaleTimeString([], {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });

      const date = now.toLocaleDateString([], {
        weekday: "short",
        year: "numeric",
        month: "short",
        day: "numeric"
      });

      clockElement.textContent = time;
      dateElement.textContent = date;
    }

    setInterval(updateClock, 1000);
    updateClock();

    /* =========================
       SIDEBAR TOGGLE
    ========================= */

    const sidebar = document.getElementById("sidebar");
    const sidebarToggleBtn = document.getElementById("sidebarToggleBtn");

    sidebarToggleBtn.addEventListener("click", function () {
      sidebar.classList.toggle("hidden");

      const isHidden = sidebar.classList.contains("hidden");

      sidebarToggleBtn.textContent = isHidden ? "☰" : "×";
      document.body.classList.toggle("sidebar-collapsed", isHidden);
    });

    /* =========================
       FILTER TOGGLE
    ========================= */

    const toggleFiltersBtn = document.getElementById("toggleFiltersBtn");
    const filterPanel = document.getElementById("filterPanel");

    toggleFiltersBtn.addEventListener("click", function () {
      filterPanel.classList.toggle("hidden");

      const isHidden = filterPanel.classList.contains("hidden");
      toggleFiltersBtn.textContent = isHidden ? "Show Filters" : "Hide Filters";
    });

    /* =========================
       DIALOG BOX
    ========================= */

    const infoDialog = document.getElementById("infoDialog");
    const dialogTitle = document.getElementById("dialogTitle");
    const dialogContent = document.getElementById("dialogContent");
    const closeDialogBtn = document.getElementById("closeDialogBtn");

    function showInfoDialog(title, content) {
      dialogTitle.textContent = title;
      dialogContent.innerHTML = content;
      infoDialog.showModal();
    }

    closeDialogBtn.addEventListener("click", function () {
      infoDialog.close();
    });

    infoDialog.addEventListener("click", function (event) {
      const rect = infoDialog.getBoundingClientRect();

      const clickedOutside =
        event.clientX < rect.left ||
        event.clientX > rect.right ||
        event.clientY < rect.top ||
        event.clientY > rect.bottom;

      if (clickedOutside) {
        infoDialog.close();
      }
    });

    /* =========================
       NEW PROJECT BEHAVIOR
       Goes directly to save page.
       No prompt for project name.
    ========================= */

    const newProjectBtn = document.getElementById("newProjectBtn");
    const saveProjectPage = document.getElementById("saveProjectPage");
    const cancelSaveProjectBtn = document.getElementById("cancelSaveProjectBtn");

    newProjectBtn.addEventListener("click", function () {
      saveProjectPage.classList.add("active");
    });

    cancelSaveProjectBtn.addEventListener("click", function () {
      saveProjectPage.classList.remove("active");
    });

    /* =========================
       MENU BUTTONS
    ========================= */

    document.getElementById("projectsBtn").addEventListener("click", function () {
      showInfoDialog(
        "Projects",
        `
          <p>Your project list can be shown here.</p>
          <p>This is displayed in a dialog box instead of covering the map permanently.</p>
        `
      );
    });

    document.getElementById("infoBtn").addEventListener("click", function () {
      showInfoDialog(
        "Information",
        `
          <p>This interface includes:</p>
          <ul>
            <li>A digital clock in the top-right corner.</li>
            <li>A bottom fillable project form.</li>
            <li>Separate-row filters with hide/show control.</li>
            <li>A sidebar that can be hidden and shown again.</li>
            <li>Information displayed inside dialog boxes.</li>
          </ul>
        `
      );
    });

    document.getElementById("settingsBtn").addEventListener("click", function () {
      showInfoDialog(
        "Settings",
        `
          <p>Settings can be added here.</p>
        `
      );
    });

    /* =========================
       BOTTOM QUICK FORM SAVE
    ========================= */

    const bottomForm = document.getElementById("bottomForm");

    bottomForm.addEventListener("submit", function (event) {
      event.preventDefault();

      const projectName = document.getElementById("quickProjectName").value.trim();
      const location = document.getElementById("quickLocation").value.trim();
      const date = document.getElementById("quickDate").value;
      const status = document.getElementById("quickStatus").value;

      showInfoDialog(
        "Project Saved",
        `
          <p><strong>Project Name:</strong> ${projectName || "Not provided"}</p>
          <p><strong>Location:</strong> ${location || "Not provided"}</p>
          <p><strong>Date:</strong> ${date || "Not provided"}</p>
          <p><strong>Status:</strong> ${status || "Not provided"}</p>
        `
      );

      bottomForm.reset();
    });

    /* =========================
       SAVE PROJECT PAGE FORM
    ========================= */

    const saveProjectForm = document.getElementById("saveProjectForm");

    saveProjectForm.addEventListener("submit", function (event) {
      event.preventDefault();

      const projectName = document.getElementById("saveProjectName").value.trim();
      const location = document.getElementById("saveProjectLocation").value.trim();
      const date = document.getElementById("saveProjectDate").value;
      const status = document.getElementById("saveProjectStatus").value;
      const description = document.getElementById("saveProjectDescription").value.trim();

      saveProjectPage.classList.remove("active");

      showInfoDialog(
        "New Project Saved",
        `
          <p><strong>Project Name:</strong> ${projectName || "Not provided"}</p>
          <p><strong>Location:</strong> ${location || "Not provided"}</p>
          <p><strong>Date:</strong> ${date || "Not provided"}</p>
          <p><strong>Status:</strong> ${status || "Not provided"}</p>
          <p><strong>Description:</strong> ${description || "Not provided"}</p>
        `
      );

      saveProjectForm.reset();
    });

    /* =========================
       FILTER CHANGE EXAMPLE
    ========================= */

    const filterInputs = [
      document.getElementById("filterStatus"),
      document.getElementById("filterDate"),
      document.getElementById("filterLocation"),
      document.getElementById("filterKeyword")
    ];

    filterInputs.forEach(function (input) {
      input.addEventListener("change", function () {
        console.log("Filters changed:", {
          status: document.getElementById("filterStatus").value,
          date: document.getElementById("filterDate").value,
          location: document.getElementById("filterLocation").value,
          keyword: document.getElementById("filterKeyword").value
        });
      });

      input.addEventListener("keyup", function () {
        console.log("Filters changed:", {
          status: document.getElementById("filterStatus").value,
          date: document.getElementById("filterDate").value,
          location: document.getElementById("filterLocation").value,
          keyword: document.getElementById("filterKeyword").value
        });
      });
    });
  </script>
</body>
</html>
