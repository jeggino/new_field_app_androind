<!-- ✅ ONLY SHOWING MODIFIED / INSERTED PARTS TO KEEP MESSAGE SIZE MANAGEABLE -->

<!-- ========================= -->
<!-- ✅ 1. CROSSHAIR FIX -->
<!-- ========================= -->

<style>
.crosshair {
  position: absolute;
  bottom: 160px; /* ✅ aligned to form */
  left: 50%;
  transform: translateX(-50%);
  z-index: 820;
  width: 36px;
  height: 36px;
}
</style>

<!-- ========================= -->
<!-- ✅ 2. DAILY REPORT BUTTON -->
<!-- ========================= -->

<!-- inside Tools sidebar -->
<button id="dailyReportBtn" class="sidebar-button secondary">
  <span>Daily report</span>
  <span>📝</span>
</button>

<!-- ========================= -->
<!-- ✅ 3. DAILY REPORT DIALOG -->
<!-- ========================= -->

<dialog id="dailyReportDialog">
  <div class="dialog-header">
    <h2>Daily Report</h2>
    <button class="dialog-close" data-close-dialog="dailyReportDialog">×</button>
  </div>

  <form id="dailyReportForm">
    <div class="dialog-body">
      <div class="form-field">
        <label>Date</label>
        <input id="reportDate" type="date" required>
      </div>

      <div class="form-field">
        <label>Report</label>
        <textarea id="reportText"></textarea>
      </div>
    </div>

    <div class="dialog-footer">
      <button type="button" class="cancel-btn" data-close-dialog="dailyReportDialog">Cancel</button>
      <button class="save-btn">Save</button>
    </div>
  </form>
</dialog>

<script>
/* =========================
   ✅ FIX CAPTURE POSITION
========================= */

function updateCaptureCoordinates() {
  if (!captureMode || !map) return;

  const point = map.containerPointToLatLng([
    map.getSize().x / 2,
    map.getSize().y - observationFormPanel.offsetHeight - 40
  ]);

  currentCoordinates.textContent =
    "Lat " + point.lat.toFixed(6) + ", Lng " + point.lng.toFixed(6);
}

async function saveNewObservation(event) {
  event.preventDefault();

  const point = map.containerPointToLatLng([
    map.getSize().x / 2,
    map.getSize().y - observationFormPanel.offsetHeight - 40
  ]);

  const feature = {
    type: "Feature",
    geometry: {
      type: "Point",
      coordinates: [
        Number(point.lng.toFixed(7)),
        Number(point.lat.toFixed(7))
      ]
    },
    properties: {
      id: createId(),
      featureType: "Point observation",
      group: obsGroup.value,
      species: obsSpecies.value,
      date: obsDate.value,
      time: obsTime.value,
      comments: obsComments.value.trim(),
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString()
    }
  };

  geojsonData.features.push(feature);
  await saveProjectToDisk();
  renderAllFeatures();
  closeCaptureMode();
}

/* =========================
   ✅ GEOMETRY EDITING
========================= */

let editMarkers = [];

window.startGeometryEdit = function(id) {
  const feature = findFeatureById(id);
  if (!feature) return;

  editMarkers.forEach(m => map.removeLayer(m));
  editMarkers = [];

  if (feature.geometry.type === "Point") {
    const c = feature.geometry.coordinates;

    const marker = L.marker([c[1], c[0]], { draggable: true }).addTo(map);

    marker.on("dragend", async () => {
      const pos = marker.getLatLng();
      feature.geometry.coordinates = [pos.lng, pos.lat];

      await saveProjectToDisk();
      renderAllFeatures();
      map.removeLayer(marker);
    });

    return;
  }

  const coords =
    feature.geometry.type === "Polygon"
      ? feature.geometry.coordinates[0]
      : feature.geometry.coordinates;

  coords.forEach((coord, i) => {
    const marker = L.marker([coord[1], coord[0]], { draggable: true }).addTo(map);

    marker.on("drag", () => {
      const pos = marker.getLatLng();
      coords[i] = [pos.lng, pos.lat];
      renderAllFeatures();
    });

    marker.on("dragend", async () => {
      await saveProjectToDisk();
    });

    editMarkers.push(marker);
  });

  showToast("Drag vertices to edit");
};

/* =========================
   ✅ ADD EDIT BUTTON TO POPUP
========================= */

function createGeometryPopupHTML(feature) {
  const props = feature.properties || {};
  const id = props.id;

  return `
    <div class="popup-title">${props.name || props.featureType}</div>
    <div class="popup-actions">
      <button class="popup-edit" onclick="startGeometryEdit('${id}')">Edit</button>
      <button class="popup-delete" onclick="deleteFeature('${id}')">Delete</button>
    </div>
  `;
}

/* =========================
   ✅ DAILY REPORT SYSTEM
========================= */

const dailyReportBtn = document.getElementById("dailyReportBtn");
const dailyReportDialog = document.getElementById("dailyReportDialog");
const dailyReportForm = document.getElementById("dailyReportForm");
const reportDate = document.getElementById("reportDate");
const reportText = document.getElementById("reportText");

let editingReportId = null;

dailyReportBtn.addEventListener("click", () => {
  reportDate.value = toDateInputValue(new Date());
  reportText.value = "";
  editingReportId = null;
  safeShowDialog(dailyReportDialog);
});

dailyReportForm.addEventListener("submit", async (e) => {
  e.preventDefault();

  if (editingReportId) {
    const f = findFeatureById(editingReportId);
    f.properties.date = reportDate.value;
    f.properties.text = reportText.value;
  } else {
    geojsonData.features.push({
      type: "Feature",
      geometry: null,
      properties: {
        id: createId(),
        featureType: "Daily report",
        date: reportDate.value,
        text: reportText.value,
        createdAt: new Date().toISOString()
      }
    });
  }

  dailyReportDialog.close();
  await saveProjectToDisk();
  showToast("Report saved");
});

window.editReport = function(id){
  const f = findFeatureById(id);
  if(!f) return;

  editingReportId = id;
  reportDate.value = f.properties.date;
  reportText.value = f.properties.text;

  safeShowDialog(dailyReportDialog);
};

window.deleteReport = async function(id){
  geojsonData.features =
    geojsonData.features.filter(f => f.properties.id !== id);

  await saveProjectToDisk();
  showToast("Report deleted");
};
</script>
</html>
