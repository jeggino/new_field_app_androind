<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Eco Field Notebook</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
/* ✅ SAME STYLE AS YOUR ORIGINAL + FIXED CROSSHAIR */

:root {
  --forest:#17382f;
  --forest-2:#225244;
  --moss:#6f9b78;
  --moss-light:#dcebdd;
  --paper:#fffaf0;
}

html,body {
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:Segoe UI;
}

#map {
  position:absolute;
  inset:0;
}

/* ✅ UPDATED CROSSHAIR (aligned with form) */
.crosshair {
  position:absolute;
  bottom:150px;
  left:50%;
  transform:translateX(-50%);
  width:36px;
  height:36px;
  z-index:1000;
}

.crosshair::before,
.crosshair::after {
  content:"";
  position:absolute;
  background:#c66e45;
}

.crosshair::before{
  width:36px;
  height:3px;
  top:16px;
}
.crosshair::after{
  width:3px;
  height:36px;
  left:16px;
}

/* buttons */
.btn{
  background:var(--forest);
  color:white;
  border:none;
  padding:10px;
  margin:5px;
  border-radius:8px;
  cursor:pointer;
}

.panel {
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  z-index:1000;
  background:white;
  padding:10px;
  border-radius:12px;
}

/* dialog */
dialog {
  border:none;
  padding:20px;
  border-radius:14px;
}
</style>
</head>

<body>

<div id="map"></div>
<div class="crosshair"></div>

<div class="panel">
  <button class="btn" id="addObs">Add Observation</button>
  <button class="btn" id="drawPoly">Draw Area</button>
  <button class="btn" id="drawLine">Draw Route</button>
  <button class="btn" id="dailyBtn">Daily Report</button>
  <button class="btn" id="saveBtn">Save</button>
</div>

<!-- DAILY REPORT -->
<dialog id="dailyDialog">
<h3>Daily Report</h3>
<input id="repDate" type="date"><br><br>
<textarea id="repText" style="width:100%"></textarea><br><br>

<button class="btn" id="repSave">Save</button>
<button class="btn" onclick="dailyDialog.close()">Close</button>
</dialog>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ---------- MAP ----------
let map = L.map("map", {
  zoomControl:true,
  doubleClickZoom:false
}).setView([52.442,4.829],13);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom:19
}).addTo(map);

// ---------- DATA ----------
let geojsonData = {
  type:"FeatureCollection",
  features:[]
};

let markerLayer = L.layerGroup().addTo(map);
let shapeLayer = L.layerGroup().addTo(map);
let tempLayer = L.layerGroup().addTo(map);

// ---------- ADD OBSERVATION ----------
document.getElementById("addObs").onclick = () => {

  // ✅ FIXED CROSSHAIR POSITION (IMPORTANT)
  const point = map.containerPointToLatLng([
    map.getSize().x / 2,
    map.getSize().y - 150
  ]);

  geojsonData.features.push({
    type:"Feature",
    geometry:{
      type:"Point",
      coordinates:[point.lng,point.lat]
    },
    properties:{
      id:crypto.randomUUID(),
      featureType:"Point observation",
      createdAt:new Date().toISOString()
    }
  });

  renderAll();
};

// ---------- DRAW STATE ----------
let drawMode = null;
let drawPoints = [];

// ---------- DRAW BUTTONS ----------
document.getElementById("drawPoly").onclick = () => {
  drawMode = "Polygon";
  drawPoints = [];
};

document.getElementById("drawLine").onclick = () => {
  drawMode = "LineString";
  drawPoints = [];
};

// ---------- MAP CLICK ----------
map.on("click", e => {
  if(!drawMode) return;

  drawPoints.push(e.latlng);
  drawTemp();
});

// ---------- FINISH DRAW ----------
map.on("dblclick", () => {
  if(!drawMode) return;

  if(drawMode==="Polygon" && drawPoints.length<3) return;
  if(drawMode==="LineString" && drawPoints.length<2) return;

  const coords = drawPoints.map(p=>[p.lng,p.lat]);

  const geometry = drawMode==="Polygon"
    ? { type:"Polygon", coordinates:[[...coords,coords[0]]] }
    : { type:"LineString", coordinates:coords };

  geojsonData.features.push({
    type:"Feature",
    geometry,
    properties:{
      id:crypto.randomUUID(),
      featureType:drawMode
    }
  });

  drawMode=null;
  drawPoints=[];
  tempLayer.clearLayers();
  renderAll();
});

// ---------- TEMP DRAW PREVIEW ----------
function drawTemp(){
  tempLayer.clearLayers();

  if(drawPoints.length<2) return;

  if(drawMode==="Polygon"){
    L.polygon(drawPoints,{color:"orange"}).addTo(tempLayer);
  }
  if(drawMode==="LineString"){
    L.polyline(drawPoints,{color:"blue"}).addTo(tempLayer);
  }
}

// ---------- RENDER ----------
function renderAll(){
  markerLayer.clearLayers();
  shapeLayer.clearLayers();

  geojsonData.features.forEach(f=>{
    if(!f.geometry) return;

    if(f.geometry.type==="Point"){
      renderPoint(f);
    }

    if(f.geometry.type==="Polygon"){
      renderPolygon(f);
    }

    if(f.geometry.type==="LineString"){
      renderLine(f);
    }
  });
}

// ---------- RENDER POINT ----------
function renderPoint(f){
  const c = f.geometry.coordinates;

  const m = L.circleMarker([c[1],c[0]],{
    radius:8,
    color:"#73508a",
    fillColor:"#a681ba",
    fillOpacity:0.9
  }).addTo(markerLayer);

  m.bindPopup(`
    Point<br>
    <button onclick="startEdit('${f.properties.id}')">Edit</button>
    <button onclick="deleteFeature('${f.properties.id}')">Delete</button>
  `);
}

// ---------- RENDER POLYGON ----------
function renderPolygon(f){
  const latlngs = f.geometry.coordinates[0].map(c=>[c[1],c[0]]);

  const p = L.polygon(latlngs,{color:"green"}).addTo(shapeLayer);

  p.bindPopup(`
    Polygon<br>
    <button onclick="startEdit('${f.properties.id}')">Edit</button>
    <button onclick="deleteFeature('${f.properties.id}')">Delete</button>
  `);
}

// ---------- RENDER LINE ----------
function renderLine(f){
  const latlngs = f.geometry.coordinates.map(c=>[c[1],c[0]]);

  const l = L.polyline(latlngs,{color:"blue",weight:4}).addTo(shapeLayer);

  l.bindPopup(`
    Line<br>
    <button onclick="startEdit('${f.properties.id}')">Edit</button>
    <button onclick="deleteFeature('${f.properties.id}')">Delete</button>
  `);
}

// ---------- EDIT SYSTEM ----------
let editMarkers = [];
let editingId = null;

window.startEdit = function(id){
  const feature = geojsonData.features.find(f => f.properties.id === id);
  if(!feature) return;

  editingId = id;

  editMarkers.forEach(m => map.removeLayer(m));
  editMarkers = [];

  // ---------- POINT ----------
  if(feature.geometry.type === "Point"){
    const c = feature.geometry.coordinates;

    const marker = L.marker([c[1], c[0]], { draggable:true }).addTo(map);

    marker.on("dragend", () => {
      const pos = marker.getLatLng();

      feature.geometry.coordinates = [pos.lng, pos.lat];
      feature.properties.updatedAt = new Date().toISOString();

      renderAll();
    });

    editMarkers.push(marker);
    return;
  }

  // ---------- POLY / LINE ----------
  const coords =
    feature.geometry.type === "Polygon"
      ? feature.geometry.coordinates[0]
      : feature.geometry.coordinates;

  coords.forEach((coord, i) => {
    const marker = L.marker([coord[1], coord[0]], { draggable:true }).addTo(map);

    // live update
    marker.on("drag", () => {
      const pos = marker.getLatLng();
      coords[i] = [pos.lng, pos.lat];
      renderAll();
    });

    marker.on("dragend", () => {
      feature.properties.updatedAt = new Date().toISOString();
    });

    editMarkers.push(marker);
  });
};

// ---------- DELETE ----------
window.deleteFeature = function(id){
  if(!confirm("Delete feature?")) return;

  geojsonData.features =
    geojsonData.features.filter(f => f.properties.id !== id);

  renderAll();
};

// ---------- SAVE ----------
document.getElementById("saveBtn").onclick = () => {
  const blob = new Blob(
    [JSON.stringify(geojsonData, null, 2)],
    { type:"application/json" }
  );

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "eco-field-project.geojson";
  a.click();
};

// ---------- DAILY REPORT SYSTEM ----------
let editingReportId = null;

document.getElementById("dailyBtn").onclick = () => {
  editingReportId = null;
  document.getElementById("repDate").value = new Date().toISOString().split("T")[0];
  document.getElementById("repText").value = "";
  document.getElementById("dailyDialog").showModal();
};

// ---------- SAVE REPORT ----------
document.getElementById("repSave").onclick = () => {

  const date = document.getElementById("repDate").value;
  const text = document.getElementById("repText").value;

  if(!date || !text){
    alert("Fill in report");
    return;
  }

  if(editingReportId){
    // EDIT EXISTING
    const report = geojsonData.features.find(f => f.properties.id === editingReportId);
    if(report){
      report.properties.date = date;
      report.properties.text = text;
      report.properties.updatedAt = new Date().toISOString();
    }
  } else {
    // CREATE NEW
    geojsonData.features.push({
      type:"Feature",
      geometry:null,
      properties:{
        id:crypto.randomUUID(),
        featureType:"Daily report",
        date:date,
        text:text,
        createdAt:new Date().toISOString()
      }
    });
  }

  document.getElementById("dailyDialog").close();
};

// ---------- OPTIONAL: EDIT REPORT ----------
window.editReport = function(id){
  const report = geojsonData.features.find(f => f.properties.id === id);
  if(!report) return;

  editingReportId = id;

  document.getElementById("repDate").value = report.properties.date;
  document.getElementById("repText").value = report.properties.text;

  document.getElementById("dailyDialog").showModal();
};

// ---------- OPTIONAL: DELETE REPORT ----------
window.deleteReport = function(id){
  if(!confirm("Delete report?")) return;

  geojsonData.features =
    geojsonData.features.filter(f => f.properties.id !== id);
};

// ---------- INIT RENDER ----------
renderAll();
</script>

</body>
</html>
